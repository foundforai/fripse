<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank You, Fripse AI</title>
  <style>
    :root { --ink:#0B1F35; }
    body { color: var(--ink); }
    .container { max-width: 720px; margin: 0 auto; padding: 1.25rem; text-align: center; }
    a.button, button { display: inline-block; padding: 0.75rem 1rem; border-radius: 8px; background: var(--ink); color: white; text-decoration: none; }
  </style>
</head>
<body>
  <main class="container">
    <h1>You are in</h1>
    <p>We will send your Readiness Report summary shortly.</p>
    <p><a class="button" href="/#book">Book a Strategy Call</a></p>
    <p id="fallback" style="display:none">
      It looks like you got here directly, please <a href="/quiz.html">submit the form</a> first.
    </p>
  </main>
  <script>
    const flag = sessionStorage.getItem("fripse_quiz_submitted");
    if (!flag) {
      document.getElementById("fallback").style.display = "block";
    }
    sessionStorage.removeItem("fripse_quiz_submitted");
  </script>
</body>
</html>
